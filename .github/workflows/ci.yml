name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        # Ignore complexity rules (C901, PLR0911, PLR0912) — pre-existing, tracked for future refactoring
        run: uv run ruff check --ignore C901 --ignore PLR0911 --ignore PLR0912 agiwo/ console/server/ tests/ console/tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check agiwo/ console/server/ tests/ console/tests/ scripts/

      - name: Import linter
        run: uv run python scripts/lint.py imports

      - name: Repo guard
        run: uv run python scripts/repo_guard.py

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  test-console:
    name: Test Console
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: cd console && uv sync

      - name: Run tests
        run: cd console && uv run pytest tests/ -v --tb=short

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: console/web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix console/web ci

      - name: Run web lint
        run: npm --prefix console/web run lint

      - name: Run web tests
        run: npm --prefix console/web test

      - name: Run web production build
        run: npm --prefix console/web run build

  package-sdk:
    name: Package SDK
    runs-on: ubuntu-latest
    needs: [lint, test-sdk]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Build SDK package
        run: uv build

      - name: Smoke test built SDK wheel
        run: uv run python scripts/smoke_release_install.py "$(ls dist/agiwo-*.whl | head -n 1)"

  package-console:
    name: Package Console
    runs-on: ubuntu-latest
    needs: [lint, test-console]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: cd console && uv sync

      - name: Build SDK package
        run: uv build

      - name: Build Console package
        run: cd console && uv build

      - name: Smoke test built Console wheel
        run: uv run python scripts/smoke_release_install.py "$(ls dist/agiwo-*.whl | head -n 1)" "$(ls console/dist/agiwo_console-*.whl | head -n 1)"
