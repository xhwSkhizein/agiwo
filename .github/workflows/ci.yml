name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check agiwo/ console/server/ tests/ console/tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check agiwo/ console/server/ tests/ console/tests/ scripts/

      - name: Import linter
        run: uv run python scripts/lint.py imports

      - name: Repo guard
        run: uv run python scripts/repo_guard.py

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  test-console:
    name: Test Console
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: cd console && uv sync

      - name: Run tests
        run: cd console && uv run pytest tests/ -v --tb=short
