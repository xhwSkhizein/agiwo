[importlinter]
root_package = agiwo
include_external_packages = True

[importlinter:contract:1]
name = sdk-must-not-depend-on-console
type = forbidden
source_modules =
    agiwo
forbidden_modules =
    server

[importlinter:contract:2]
name = agent-must-not-depend-on-scheduler
type = forbidden
source_modules =
    agiwo.agent
forbidden_modules =
    agiwo.scheduler

[importlinter:contract:3]
name = llm-must-not-depend-on-agent-runtime
type = forbidden
source_modules =
    agiwo.llm
forbidden_modules =
    agiwo.agent.runtime

[importlinter:contract:4]
name = skill-must-not-depend-on-agent-options
type = forbidden
source_modules =
    agiwo.skill
forbidden_modules =
    agiwo.agent.options

[importlinter:contract:5]
name = tool-core-must-not-depend-on-agent-or-scheduler
type = forbidden
source_modules =
    agiwo.tool.base
    agiwo.tool.context
    agiwo.tool.cache
forbidden_modules =
    agiwo.agent
    agiwo.scheduler
    agiwo.llm.helper

[importlinter:contract:7]
name = observability-core-must-not-depend-on-agent-runtime
type = forbidden
source_modules =
    agiwo.observability
forbidden_modules =
    agiwo.agent

[importlinter:contract:8]
name = scheduler-runtime-must-not-depend-on-agent-implementation
type = forbidden
source_modules =
    agiwo.scheduler.engine
    agiwo.scheduler.runner
    agiwo.scheduler.coordinator
forbidden_modules =
    agiwo.agent.agent
    agiwo.agent.engine
    agiwo.agent.lifecycle

[importlinter:contract:10]
name = agent-engine-must-not-depend-on-agent-facade-or-scheduler
type = forbidden
source_modules =
    agiwo.agent.engine
forbidden_modules =
    agiwo.agent.agent
    agiwo.scheduler

[importlinter:contract:11]
name = agent-lifecycle-core-must-not-depend-on-agent-engine
type = forbidden
source_modules =
    agiwo.agent.lifecycle.assembly
    agiwo.agent.lifecycle.definition
    agiwo.agent.lifecycle.resource_owner
    agiwo.agent.lifecycle.session
forbidden_modules =
    agiwo.agent.engine

[importlinter:contract:9]
name = agent-storage-factory-must-not-depend-on-observability
type = forbidden
source_modules =
    agiwo.agent.storage.factory
forbidden_modules =
    agiwo.observability
