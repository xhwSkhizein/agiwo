[importlinter]
root_package = agiwo
include_external_packages = True

[importlinter:contract:1]
name = sdk-must-not-depend-on-console
type = forbidden
source_modules =
    agiwo
forbidden_modules =
    server

[importlinter:contract:2]
name = agent-must-not-depend-on-scheduler
type = forbidden
source_modules =
    agiwo.agent
forbidden_modules =
    agiwo.scheduler

[importlinter:contract:3]
name = llm-must-not-depend-on-agent
type = forbidden
source_modules =
    agiwo.llm
forbidden_modules =
    agiwo.agent

[importlinter:contract:4]
name = skill-must-not-depend-on-agent-config
type = forbidden
source_modules =
    agiwo.skill
forbidden_modules =
    agiwo.agent.models.config

[importlinter:contract:5]
name = tool-core-must-not-depend-on-agent-or-scheduler
type = forbidden
source_modules =
    agiwo.tool.base
    agiwo.tool.context
forbidden_modules =
    agiwo.agent
    agiwo.scheduler
    agiwo.llm.helper

[importlinter:contract:7]
name = observability-core-must-not-depend-on-agent
type = forbidden
source_modules =
    agiwo.observability
forbidden_modules =
    agiwo.agent

[importlinter:contract:8]
name = scheduler-runtime-must-not-depend-on-agent-internals
type = forbidden
source_modules =
    agiwo.scheduler.engine
    agiwo.scheduler.runner
    agiwo.scheduler.runtime_state
    agiwo.scheduler.tool_control
forbidden_modules =
    agiwo.agent.run_loop
    agiwo.agent.tool_executor
    agiwo.agent.compaction
    agiwo.agent.llm_caller
    agiwo.agent.prompt
    agiwo.agent.runtime
allow_indirect_imports = True

[importlinter:contract:9]
name = agent-storage-factory-must-not-depend-on-observability
type = forbidden
source_modules =
    agiwo.agent.storage.factory
forbidden_modules =
    agiwo.observability
allow_indirect_imports = True
