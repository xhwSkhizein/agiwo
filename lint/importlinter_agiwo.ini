[importlinter]
root_package = agiwo
include_external_packages = True

[importlinter:contract:1]
name = sdk-must-not-depend-on-console
type = forbidden
source_modules =
    agiwo
forbidden_modules =
    server

[importlinter:contract:2]
name = agent-must-not-depend-on-scheduler
type = forbidden
source_modules =
    agiwo.agent
forbidden_modules =
    agiwo.scheduler
